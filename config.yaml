name: "Comelit Integration"
description: "Integrazione alla domotica Comelit"
version: "1.1.11"
slug: "comelit-integration"
image: "ghcr.io/vanhelsing2048/mqtt_net_comelit"
init: false
arch:
  - aarch64
  - amd64
  - armv7
options:
  comelit-username: "your-comelit-username"
  comelit-password: "your-comelit-password"
  comelit-HubIPAddress: "192.168.1.100"
  comelit-HubMACAddress: "001122334455"
  comelit-ROOTelement: "GEN#17#13#1"
  polling: 60
  mosquitto-username: "your-mqtt-username"
  mosquitto-password: "your-mqtt-password"
  mosquitto-IPAddress: "192.168.1.10"
  init-device-config: false
  log-level: "debug"
schema:
  comelit-username: "str"
  comelit-password: "password"
  comelit-HubIPAddress: "str"
  comelit-HubMACAddress: "str"
  comelit-ROOTelement: "str"
  polling: int
  mosquitto-username: "str"
  mosquitto-password: "password"
  mosquitto-IPAddress: "str"
  init-device-config: bool
  log-level: "list(debug|info|warning|error)"
